name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: Build and Package
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Publish Workspace Launcher
        run: |
          dotnet publish WorkspaceLauncher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            -o ./publish

      - name: Verify Executable
        run: |
          if (Test-Path "./publish/WorkspaceLauncher.exe") {
            Write-Host "Executable found: ./publish/WorkspaceLauncher.exe"
          } else {
            Write-Error "Executable NOT found!"
            exit 1
          }

      - name: Create Zip Package
        run: |
          Compress-Archive -Path "./publish/WorkspaceLauncher.exe" -DestinationPath "./WorkspaceLauncher.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkspaceLauncher-Binary
          path: ./WorkspaceLauncher.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ./WorkspaceLauncher.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
